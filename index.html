<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bag of Tricks</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E🔮%3C%2Ftext%3E%3C%2Fsvg%3E"
    />
    <link href="/src/style.css" rel="stylesheet" />
  </head>
  <body>
    <header class="header">
      <div class="container flex items-center justify-between">
        <h1 class="text-white">Bag of Tricks</h1>

        <a
          href="https://github.com/Res42"
          target="_blank"
          rel="noopener noreferrer"
          class="h1 text-slate-400 hover:text-white transition-colors duration-200"
          aria-label="Res42 - Github"
        >
          <i class="fa-brands fa-github"></i>
        </a>
      </div>
    </header>
    <main>
      <div class="container">
        <section>
          <h2 class="my-3">ÁNYK</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3">
            <app-card>
              <h3 slot="header">ÁNYK Docker image-ek</h3>

              <div slot="body">
                <a class="link" href="https://github.com/Res42/anyk-docker">
                  https://github.com/Res42/anyk-docker
                </a>
              </div>
            </app-card>
          </div>
        </section>

        <section>
          <h2 class="my-3">Portfolio Performance</h2>

          <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3">
            <app-file-card id="makToPp" accept=".csv, .xls, .xlsx">
              <h3 slot="header">MÁK <code>transaction.xls</code> átalakító</h3>

              <div slot="body-start">
                <label>
                  <input id="havasdMode" type="checkbox" checked />
                  Havasd mód
                  <i
                    class="fa-solid fa-circle-question text-indigo-500"
                    title="Ha te is használod a https://github.com/havasd/pp-scraper adatait, akkor pipáld be."
                  ></i>
                </label>
              </div>
            </app-file-card>

            <app-card>
              <h3 slot="header">Magyar ingatlan árak</h3>

              <div slot="body">
                <a
                  class="link"
                  href="https://github.com/Res42/pp-hu-re-scraper"
                >
                  https://github.com/Res42/pp-hu-re-scraper
                </a>
              </div>
            </app-card>
          </div>
        </section>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
