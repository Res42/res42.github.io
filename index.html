<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bag of Tricks</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E🔮%3C%2Ftext%3E%3C%2Fsvg%3E"
    />
    <link href="/src/style.css" rel="stylesheet" />
  </head>
  <body>
    <header class="header">
      <div class="container flex items-center justify-between">
        <h1 class="text-white">Bag of Tricks</h1>

        <a
          href="https://github.com/Res42"
          target="_blank"
          rel="noopener noreferrer"
          class="text-slate-400 hover:text-white transition-colors duration-200"
          aria-label="Res42 - Github"
        >
          <svg
            class="w-7 h-7 fill-current"
            viewBox="0 0 24 24"
            xmlns="http://w3.org"
          >
            <path
              d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
            />
          </svg>
        </a>
      </div>
    </header>
    <main>
      <div class="container">
        <section>
          <h2 class="my-3">ÁNYK</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3">
            <app-card>
              <h3 slot="header">ÁNYK Docker image-ek</h3>

              <div slot="body">
                <a class="link" href="https://github.com/Res42/anyk-docker">
                  https://github.com/Res42/anyk-docker
                </a>
              </div>
            </app-card>
          </div>
        </section>

        <section>
          <h2 class="my-3">Portfolio Performance</h2>

          <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3">
            <app-file-card id="makToPp" accept=".csv, .xls, .xlsx">
              <h3 slot="header">MÁK <code>transaction.xls</code> átalakító</h3>

              <div slot="body-start">
                <label
                  ><input id="havasdMode" type="checkbox" checked /> Havasd
                  mód</label
                >
              </div>
            </app-file-card>

            <app-card>
              <h3 slot="header">Magyar ingatlan árak</h3>

              <div slot="body">
                <a
                  class="link"
                  href="https://github.com/Res42/pp-hu-re-scraper"
                >
                  https://github.com/Res42/pp-hu-re-scraper
                </a>
              </div>
            </app-card>
          </div>
        </section>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
